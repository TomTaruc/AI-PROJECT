<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOLPHI Admin</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #F8FAFC; color: #1A3A5C; }
.layout { display: flex; height: 100vh; width: 100vw; overflow: hidden; }
.sidebar { width: 260px; min-width: 260px; background: #1A3A5C; display: flex; flex-direction: column; overflow-y: auto; flex-shrink: 0; }
.sidebar-brand { padding: 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
.brand-name { color: white; font-size: 15px; font-weight: 700; letter-spacing: 0.06em; }
.brand-sub { color: #F5C518; font-size: 10px; letter-spacing: 0.12em; margin-top: 3px; }
.brand-user { color: rgba(255,255,255,0.8); font-size: 13px; margin-top: 14px; }
.logout-link { color: #F5C518; text-decoration: none; }
.logout-link:hover { text-decoration: underline; }
.sidebar-nav { padding: 10px 0; flex: 1; }
.nav-item { padding: 13px 20px; cursor: pointer; font-size: 14px; color: rgba(255,255,255,0.65); border-left: 3px solid transparent; transition: background 0.12s, color 0.12s; user-select: none; }
.nav-item:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.9); }
.nav-item.active { background: rgba(255,255,255,0.13); color: white; border-left-color: #F5C518; font-weight: 600; }
.main-content { flex: 1; overflow-y: auto; padding: 32px 36px; background: #F8FAFC; min-width: 0; }
.section { display: none; }
.section.visible { display: block; }
.section-heading { font-size: 20px; font-weight: 700; color: #1A3A5C; margin-bottom: 24px; padding-bottom: 12px; border-bottom: 2px solid #E2E8F0; }
.stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; max-width: 720px; margin-bottom: 28px; }
.stat-card { background: white; border: 1px solid #E2E8F0; border-radius: 8px; padding: 22px 24px; }
.stat-num { font-size: 34px; font-weight: 700; color: #1A3A5C; line-height: 1; }
.stat-lbl { font-size: 13px; color: #94A3B8; margin-top: 8px; }
.card { background: white; border: 1px solid #E2E8F0; border-radius: 8px; padding: 20px 24px; margin-bottom: 20px; }
.card-title { font-size: 14px; font-weight: 700; color: #1A3A5C; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid #F1F5F9; }
.btn { display: inline-flex; align-items: center; padding: 8px 18px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; letter-spacing: 0.03em; transition: background 0.12s, color 0.12s; }
.btn-primary { background: #1A3A5C; color: white; }
.btn-primary:hover { background: #F5C518; color: #1A3A5C; }
.btn-secondary { background: #F1F5F9; color: #1A3A5C; border: 1px solid #E2E8F0; }
.btn-secondary:hover { background: #E2E8F0; }
.btn-danger { background: #FEE2E2; color: #DC2626; }
.btn-danger:hover { background: #DC2626; color: white; }
.btn-warning { background: #FEF9C3; color: #92400E; }
.btn-sm { padding: 5px 12px; font-size: 12px; }
.btn-xs { padding: 3px 9px; font-size: 11px; }
.tbl-wrap { background: white; border: 1px solid #E2E8F0; border-radius: 8px; overflow: hidden; margin-bottom: 20px; }
table { width: 100%; border-collapse: collapse; }
thead th { background: #F1F5F9; color: #64748B; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; padding: 11px 14px; text-align: left; border-bottom: 1px solid #E2E8F0; }
tbody td { padding: 11px 14px; font-size: 13px; color: #334155; border-bottom: 1px solid #F8FAFC; vertical-align: middle; }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: #FAFCFF; }
.badge { display: inline-block; padding: 3px 9px; border-radius: 12px; font-size: 11px; font-weight: 600; }
.badge-admin { background: #1A3A5C; color: white; }
.badge-user { background: #E2E8F0; color: #64748B; }
.badge-active { background: #DCFCE7; color: #15803D; }
.badge-inactive { background: #FEE2E2; color: #DC2626; }
.badge-pending { background: #FEF9C3; color: #92400E; }
.badge-resolved { background: #DCFCE7; color: #15803D; }
.badge-positive { background: #DCFCE7; color: #15803D; }
.badge-negative { background: #FEE2E2; color: #DC2626; }
.inline-detail { background: #F8FAFC; border-top: 2px solid #F5C518; padding: 14px 16px; }
.filter-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.filter-btn { padding: 6px 16px; border-radius: 20px; border: 1px solid #E2E8F0; background: white; color: #64748B; font-size: 12px; cursor: pointer; font-weight: 500; transition: all 0.1s; }
.filter-btn:hover { border-color: #1A3A5C; color: #1A3A5C; }
.filter-btn.active { background: #1A3A5C; color: white; border-color: #1A3A5C; }
.form-row { margin-bottom: 14px; }
.form-lbl { display: block; font-size: 12px; font-weight: 600; color: #475569; margin-bottom: 5px; }
.form-ctrl { width: 100%; padding: 8px 12px; border: 1px solid #E2E8F0; border-radius: 6px; font-size: 13px; color: #1A3A5C; background: white; }
.form-ctrl:focus { outline: none; border-color: #1A3A5C; box-shadow: 0 0 0 2px rgba(26,58,92,0.1); }
.search-bar { margin-bottom: 14px; }
.search-input { width: 100%; max-width: 380px; padding: 8px 14px; border: 1px solid #E2E8F0; border-radius: 6px; font-size: 13px; color: #1A3A5C; }
.search-input:focus { outline: none; border-color: #1A3A5C; }
.pagination { display: flex; align-items: center; gap: 10px; margin-top: 14px; font-size: 13px; color: #94A3B8; }
.upload-zone { border: 2px dashed #CBD5E1; border-radius: 8px; padding: 28px; text-align: center; cursor: pointer; margin-bottom: 14px; transition: border-color 0.15s; }
.upload-zone:hover { border-color: #F5C518; }
.upload-zone p { color: #94A3B8; font-size: 14px; margin: 0; }
.file-chip { display: flex; align-items: center; justify-content: space-between; background: #F1F5F9; border-radius: 4px; padding: 5px 10px; margin-bottom: 4px; font-size: 13px; }
.file-chip-name { color: #1A3A5C; }
.file-chip-remove { background: none; border: none; color: #94A3B8; cursor: pointer; font-size: 16px; font-weight: bold; line-height: 1; padding: 0 2px; }
.file-chip-remove:hover { color: #DC2626; }
.ingest-results { margin-top: 12px; }
.ingest-result-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 10px; border-radius: 4px; margin-bottom: 4px; font-size: 13px; }
.ingest-success { background: #F0FDF4; color: #15803D; }
.ingest-error { background: #FEF2F2; color: #DC2626; }
.transcript-box { max-height: 280px; overflow-y: auto; background: #F8FAFC; border-radius: 6px; padding: 12px; margin-top: 10px; border: 1px solid #E2E8F0; }
.t-msg { margin-bottom: 10px; }
.t-role { font-size: 11px; font-weight: 700; color: #94A3B8; margin-bottom: 2px; text-transform: uppercase; }
.t-content { font-size: 13px; color: #334155; line-height: 1.55; }
.t-time { font-size: 11px; color: #CBD5E1; margin-top: 2px; }
.status-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #F1F5F9; }
.status-row:last-child { border-bottom: none; }
.status-lbl { font-size: 13px; color: #94A3B8; }
.status-val { font-size: 13px; font-weight: 600; color: #1A3A5C; }
.dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
.dot-green { background: #16A34A; }
.dot-red { background: #DC2626; }
.dot-yellow { background: #F5C518; }
.loading-box { text-align: center; padding: 48px 20px; color: #94A3B8; font-size: 14px; }
.error-box { text-align: center; padding: 48px 20px; }
.error-box p { color: #DC2626; font-size: 14px; margin-bottom: 14px; }
.success-banner { background: #F0FDF4; border: 1px solid #86EFAC; border-radius: 6px; padding: 10px 14px; color: #15803D; font-size: 13px; margin-bottom: 14px; }
.info-banner { background: #EFF6FF; border: 1px solid #BFDBFE; border-radius: 6px; padding: 10px 14px; color: #1D4ED8; font-size: 13px; margin-bottom: 14px; }
.pipeline-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; max-width: 500px; }
.pipeline-item { background: #F8FAFC; border: 1px solid #E2E8F0; border-radius: 6px; padding: 12px 16px; }
.pipeline-item-label { font-size: 11px; color: #94A3B8; text-transform: uppercase; letter-spacing: 0.05em; }
.pipeline-item-value { font-size: 14px; font-weight: 700; color: #1A3A5C; margin-top: 4px; }
</style>
</head>
<body>

<div class="layout">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-name">DOLPHI ADMIN</div>
      <div class="brand-sub">HYBRID RAG SERVICE ENGINE</div>
      <div class="brand-user">
        Administrator &nbsp;
        <a href="/admin/logout" class="logout-link">Logout</a>
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebarNav">
      <div class="nav-item active" data-target="dashboard">Dashboard</div>
      <div class="nav-item" data-target="users">Users</div>
      <div class="nav-item" data-target="knowledge-base">Knowledge Base</div>
      <div class="nav-item" data-target="conversations">Conversations</div>
      <div class="nav-item" data-target="handoff-queue">Handoff Queue</div>
      <div class="nav-item" data-target="feedback">Feedback</div>
      <div class="nav-item" data-target="settings">Settings</div>
    </nav>
  </aside>

  <main class="main-content" id="mainContent">
    <div class="section visible" id="dashboard">
      <h2 class="section-heading">System Overview</h2>
      <div id="dashboard-body"></div>
    </div>
    <div class="section" id="users">
      <h2 class="section-heading">User Management</h2>
      <div id="users-body"></div>
    </div>
    <div class="section" id="knowledge-base">
      <h2 class="section-heading">Knowledge Base</h2>
      <div id="knowledge-base-body"></div>
    </div>
    <div class="section" id="conversations">
      <h2 class="section-heading">Conversations</h2>
      <div id="conversations-body"></div>
    </div>
    <div class="section" id="handoff-queue">
      <h2 class="section-heading">Handoff Queue</h2>
      <div id="handoff-queue-body"></div>
    </div>
    <div class="section" id="feedback">
      <h2 class="section-heading">Customer Feedback</h2>
      <div id="feedback-body"></div>
    </div>
    <div class="section" id="settings">
      <h2 class="section-heading">System Settings</h2>
      <div id="settings-body"></div>
    </div>
  </main>

</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  console.log('DOLPHI ADMIN: DOMContentLoaded fired');

  /* ── ESCAPE HELPER ── */
  function esc(v) {
    if (v === null || v === undefined) return '';
    return String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
  }

  function fmtDate(iso) {
    if (!iso) return 'Never';
    try { return new Date(iso).toLocaleString(); } catch(e) { return esc(iso); }
  }

  function trunc(s, n) {
    if (!s) return '';
    const t = String(s);
    return t.length > n ? t.slice(0, n) + '…' : t;
  }

  /* ── STATE ── */
  const S = {
    section: 'dashboard',
    handoffTimer: null,
    allFeedback: [],
    allHandoffs: [],
    convPage: 1,
    files: []
  };

  /* ── NAVIGATION ── */
  const navEl = document.getElementById('sidebarNav');
  const navItems = navEl.querySelectorAll('.nav-item');
  console.log('DOLPHI ADMIN: Nav items found:', navItems.length);

  navEl.addEventListener('click', function(e) {
    const item = e.target.closest('.nav-item');
    if (!item) { return; }
    const target = item.dataset.target;
    console.log('DOLPHI ADMIN: Nav click ->', target);
    go(target);
  });

  function go(id) {
    if (S.handoffTimer) { clearInterval(S.handoffTimer); S.handoffTimer = null; }
    navItems.forEach(function(n) { n.classList.toggle('active', n.dataset.target === id); });
    document.querySelectorAll('.section').forEach(function(s) { s.classList.remove('visible'); });
    const sec = document.getElementById(id);
    if (!sec) { console.error('DOLPHI ADMIN: Missing section element:', id); return; }
    sec.classList.add('visible');
    S.section = id;
    ({ dashboard: loadDash, users: loadUsers, 'knowledge-base': loadKB, conversations: loadConv, 'handoff-queue': loadHQ, feedback: loadFB, settings: loadSettings })[id]?.();
  }

  /* ── FETCH ── */
  async function api(url, opts) {
    opts = opts || {};
    const isForm = opts.body instanceof FormData;
    const cfg = Object.assign({ credentials: 'include' }, opts);
    if (!isForm) cfg.headers = Object.assign({ 'Content-Type': 'application/json' }, opts.headers || {});
    const r = await fetch(url, cfg);
    if (r.status === 401) { window.location.href = '/admin/login'; return null; }
    const data = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(data.error || data.message || 'HTTP ' + r.status);
    return data;
  }

  function body(id) { return document.getElementById(id + '-body'); }

  function setHTML(id, html) {
    const el = body(id);
    if (el) el.innerHTML = html;
    else console.error('DOLPHI ADMIN: Body element missing:', id + '-body');
  }

  function loading(id) { setHTML(id, '<div class="loading-box">Loading…</div>'); }

  function errBox(id, msg) {
    setHTML(id, '<div class="error-box"><p>' + esc(msg) + '</p><button class="btn btn-primary btn-sm" id="retry-' + esc(id) + '">Retry</button></div>');
    const btn = document.getElementById('retry-' + id);
    if (btn) btn.addEventListener('click', function() { go(S.section); });
  }

  async function loadDash() {
    loading('dashboard');
    try {
      const d = await api('/api/admin/stats');
      if (!d) return;
      setHTML('dashboard', `
        <div class="stat-grid">
          <div class="stat-card"><div class="stat-num">${esc(String(d.total_messages_today??0))}</div><div class="stat-lbl">Total Messages Today</div></div>
          <div class="stat-card"><div class="stat-num">${esc(String(d.total_sessions??0))}</div><div class="stat-lbl">Total Sessions</div></div>
          <div class="stat-card"><div class="stat-num">${esc(String(d.average_confidence??0))}%</div><div class="stat-lbl">Avg Confidence Score</div></div>
          <div class="stat-card"><div class="stat-num">${esc(String(d.escalation_rate??0))}%</div><div class="stat-lbl">Escalation Rate</div></div>
        </div>
      `);
    } catch(e) { errBox('dashboard', e.message); }
  }

  async function loadUsers() {
    loading('users');
    try {
      const users = await api('/api/admin/users');
      if (!users) return;
      let html = `
        <div style="margin-bottom: 16px;">
          <button class="btn btn-primary" id="btn-create-user-toggle">Create New User</button>
        </div>
        <div id="create-user-form" class="card" style="display:none; max-width: 500px;">
          <h3 class="card-title">Create User</h3>
          <div class="form-row"><label class="form-lbl">Full Name</label><input type="text" id="cu-fullname" class="form-ctrl"></div>
          <div class="form-row"><label class="form-lbl">Username</label><input type="text" id="cu-username" class="form-ctrl"></div>
          <div class="form-row"><label class="form-lbl">Email</label><input type="text" id="cu-email" class="form-ctrl"></div>
          <div class="form-row"><label class="form-lbl">Password</label><input type="password" id="cu-password" class="form-ctrl"></div>
          <div class="form-row"><label class="form-lbl">Role</label>
            <select id="cu-role" class="form-ctrl"><option value="user">User</option><option value="admin">Admin</option></select>
          </div>
          <div><button class="btn btn-primary btn-sm" id="btn-create-user-save">Save</button>
          <button class="btn btn-secondary btn-sm" id="btn-create-user-cancel">Cancel</button></div>
        </div>
        <div class="tbl-wrap">
          <table>
            <thead><tr><th>ID</th><th>Username</th><th>Email</th><th>Role</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody>
      `;
      users.forEach(u => {
        html += `
          <tr>
            <td>${esc(u.id)}</td>
            <td>${esc(u.username)}</td>
            <td>${esc(u.email)}</td>
            <td><span class="badge ${u.role === 'admin' ? 'badge-admin' : 'badge-user'}">${esc(u.role)}</span></td>
            <td><span class="badge ${u.is_active ? 'badge-active' : 'badge-inactive'}">${u.is_active ? 'Active' : 'Inactive'}</span></td>
            <td>
              <button class="btn btn-sm btn-secondary btn-view-user" data-id="${esc(u.id)}">VIEW</button>
              <button class="btn btn-sm btn-secondary btn-edit-user" data-id="${esc(u.id)}">EDIT</button>
              <button class="btn btn-sm ${u.is_active ? 'btn-danger' : 'btn-primary'} btn-toggle-user" data-id="${esc(u.id)}">${u.is_active ? 'DEACTIVATE' : 'ACTIVATE'}</button>
            </td>
          </tr>
          <tr id="user-details-${esc(u.id)}" style="display:none;" class="inline-detail">
            <td colspan="6">
              Full Name: ${esc(u.full_name)}<br>
              Created At: ${fmtDate(u.created_at)}<br>
              Last Login: ${fmtDate(u.last_login)}
            </td>
          </tr>
          <tr id="user-edit-${esc(u.id)}" style="display:none;" class="inline-detail">
            <td colspan="6">
              <select id="edit-role-${esc(u.id)}" class="form-ctrl" style="width: auto; display: inline-block;"><option value="user" ${u.role === 'user' ? 'selected' : ''}>User</option><option value="admin" ${u.role === 'admin' ? 'selected' : ''}>Admin</option></select>
              <label style="margin-left: 10px;"><input type="checkbox" id="edit-active-${esc(u.id)}" ${u.is_active ? 'checked' : ''}> Active</label>
              <button class="btn btn-sm btn-primary btn-save-user margin-left: 10px;" data-id="${esc(u.id)}">SAVE</button>
            </td>
          </tr>
        `;
      });
      html += '</tbody></table></div>';
      setHTML('users', html);

      const usersBody = body('users');
      usersBody.addEventListener('click', async function(e) {
        if (e.target.id === 'btn-create-user-toggle' || e.target.id === 'btn-create-user-cancel') {
          const form = document.getElementById('create-user-form');
          form.style.display = form.style.display === 'none' ? 'block' : 'none';
        }
        if (e.target.id === 'btn-create-user-save') {
          const u = document.getElementById('cu-username').value;
          const e_ = document.getElementById('cu-email').value;
          const p = document.getElementById('cu-password').value;
          const f = document.getElementById('cu-fullname').value;
          const r = document.getElementById('cu-role').value;
          try {
            await api('/api/admin/users/create', { method: 'POST', body: JSON.stringify({username: u, email: e_, password: p, full_name: f, role: r}) });
            loadUsers();
          } catch(err) { alert(err.message); }
        }
        const viewBtn = e.target.closest('.btn-view-user');
        if (viewBtn) {
          const row = document.getElementById('user-details-' + viewBtn.dataset.id);
          row.style.display = row.style.display === 'none' ? 'table-row' : 'none';
        }
        const editBtn = e.target.closest('.btn-edit-user');
        if (editBtn) {
          const row = document.getElementById('user-edit-' + editBtn.dataset.id);
          row.style.display = row.style.display === 'none' ? 'table-row' : 'none';
        }
        const toggleBtn = e.target.closest('.btn-toggle-user');
        if (toggleBtn) {
          try {
            await api('/api/admin/users/' + toggleBtn.dataset.id + '/deactivate', { method: 'PATCH' });
            loadUsers();
          } catch(err) { alert(err.message); }
        }
        const saveBtn = e.target.closest('.btn-save-user');
        if (saveBtn) {
          const id = saveBtn.dataset.id;
          const r = document.getElementById('edit-role-' + id).value;
          const a = document.getElementById('edit-active-' + id).checked;
          try {
            await api('/api/admin/users/' + id, { method: 'PATCH', body: JSON.stringify({role: r, is_active: a}) });
            loadUsers();
          } catch(err) { alert(err.message); }
        }
      });
    } catch(e) { errBox('users', e.message); }
  }

  async function loadKB() {
    loading('knowledge-base');
    try {
      const [docs, sts] = await Promise.all([
        api('/api/documents'),
        api('/api/admin/pipeline-status')
      ]);

      let html = `
        <div class="card" style="max-width: 600px;">
          <h3 class="card-title">Upload Documents</h3>
          <label class="upload-zone" id="kb-upload-zone" style="display:block;">
            <p>Click to select files</p>
            <input type="file" id="kb-file-input" multiple style="display:none">
          </label>
          <div id="kb-file-list" style="margin-bottom: 12px;"></div>
          <button id="kb-ingest-btn" class="btn btn-primary" disabled>INGEST DOCUMENTS</button>
          <div id="kb-ingest-results" class="ingest-results"></div>
        </div>

        <div class="card" style="max-width: 600px;">
          <h3 class="card-title">Pipeline Status</h3>
      `;

      if (sts) {
        html += `
          <div class="pipeline-grid">
            <div class="pipeline-item"><div class="pipeline-item-label">Status</div><div class="pipeline-item-value">${esc(sts.status || 'Active')}</div></div>
            <div class="pipeline-item"><div class="pipeline-item-label">Total Documents</div><div class="pipeline-item-value">${esc(String(sts.documents??0))}</div></div>
            <div class="pipeline-item"><div class="pipeline-item-label">Total Chunks</div><div class="pipeline-item-value">${esc(String(sts.chunks??0))}</div></div>
          </div>
          <button id="btn-rebuild-index" class="btn btn-warning" style="margin-top: 16px;">Rebuild Index</button>
        `;
      } else {
        html += `<div>Status unavailable.</div>`;
      }

      html += `
        </div>
        <div class="tbl-wrap">
          <table>
            <thead><tr><th>ID</th><th>Filename</th><th>Status</th><th>Chunks</th><th>Created</th><th>Actions</th></tr></thead>
            <tbody>
      `;
      if (docs) {
        docs.forEach(d => {
          html += `
            <tr>
              <td>${esc(d.id)}</td>
              <td>${esc(d.filename)}</td>
              <td><span class="badge badge-active">${esc(d.status)}</span></td>
              <td>${esc(String(d.total_chunks??0))}</td>
              <td>${fmtDate(d.created_at)}</td>
              <td><button class="btn btn-sm btn-danger btn-del-doc" data-id="${esc(d.id)}">DELETE</button></td>
            </tr>
          `;
        });
      }
      html += `</tbody></table></div>`;
      setHTML('knowledge-base', html);

      const refreshFiles = () => {
        const list = document.getElementById('kb-file-list');
        list.innerHTML = S.files.map((f, i) => `
          <div class="file-chip">
            <span class="file-chip-name">${esc(f.name)}</span>
            <button class="file-chip-remove" data-idx="${i}">×</button>
          </div>
        `).join('');
        document.getElementById('kb-ingest-btn').disabled = S.files.length === 0;
      };

      document.getElementById('kb-file-input').addEventListener('change', e => {
        Array.from(e.target.files).forEach(f => S.files.push(f));
        refreshFiles();
        e.target.value = '';
      });

      body('knowledge-base').addEventListener('click', async e => {
        if (e.target.classList.contains('file-chip-remove')) {
          S.files.splice(parseInt(e.target.dataset.idx, 10), 1);
          refreshFiles();
        }
        if (e.target.id === 'kb-ingest-btn') {
          if (S.files.length === 0) return;
          const fd = new FormData();
          S.files.forEach(f => fd.append('documents', f));
          const btn = document.getElementById('kb-ingest-btn');
          btn.disabled = true; btn.innerText = 'Uploading...';
          try {
            await api('/api/upload-document', { method: 'POST', body: fd, headers: {} });
            S.files = []; refreshFiles(); loadKB();
          } catch(err) { alert(err.message); btn.disabled = false; btn.innerText = 'INGEST DOCUMENTS'; }
        }
        if (e.target.id === 'btn-rebuild-index') {
          try {
            await api('/api/admin/rebuild-index', { method: 'POST' });
            alert('Rebuild queued'); loadKB();
          } catch(err) { alert(err.message); }
        }
        const delBtn = e.target.closest('.btn-del-doc');
        if (delBtn) {
          if (confirm('Delete document?')) {
            try {
              await api('/api/documents/' + delBtn.dataset.id, { method: 'DELETE' });
              loadKB();
            } catch(err) { alert(err.message); }
          }
        }
      });
    } catch(e) { errBox('knowledge-base', e.message); }
  }

  async function loadConv(page = S.convPage) {
    S.convPage = page;
    loading('conversations');
    try {
      const data = await api('/api/admin/conversations?page=' + page + '&per_page=20');
      if (!data) return;
      let html = `
        <div class="search-bar"><input type="text" id="conv-search" class="search-input" placeholder="Search Session ID..."></div>
        <div class="tbl-wrap">
          <table>
            <thead><tr><th>Session ID</th><th>Last Activity</th><th>Actions</th></tr></thead>
            <tbody>
      `;
      data.forEach(s => {
        html += `
          <tr class="conv-row">
            <td class="conv-sid">${esc(s.session_token || s.session_id)}</td>
            <td>${fmtDate(s.last_activity || s.started_at)}</td>
            <td><button class="btn btn-sm btn-primary btn-view-conv" data-sid="${esc(s.session_token || s.session_id)}">VIEW</button></td>
          </tr>
        `;
      });
      html += `
          </tbody></table>
        </div>
        <div class="pagination">
          <button class="btn btn-sm btn-secondary btn-conv-prev">Prev</button>
          <span>Page ${esc(String(page))}</span>
          <button class="btn btn-sm btn-secondary btn-conv-next">Next</button>
        </div>
      `;
      setHTML('conversations', html);

      const kbBody = body('conversations');
      kbBody.querySelector('#conv-search').addEventListener('input', e => {
        const v = e.target.value.toLowerCase();
        kbBody.querySelectorAll('.conv-row').forEach(row => {
          row.style.display = row.querySelector('.conv-sid').textContent.toLowerCase().includes(v) ? 'table-row' : 'none';
        });
      });

      kbBody.addEventListener('click', async e => {
        if (e.target.classList.contains('btn-conv-prev') && S.convPage > 1) loadConv(S.convPage - 1);
        if (e.target.classList.contains('btn-conv-next')) loadConv(S.convPage + 1);
        
        const viewBtn = e.target.closest('.btn-view-conv');
        if (viewBtn) {
          const row = viewBtn.closest('tr');
          let next = row.nextElementSibling;
          if (next && next.classList.contains('conv-detail')) {
            next.style.display = next.style.display === 'none' ? 'table-row' : 'none';
            return;
          }
          const tr = document.createElement('tr');
          tr.className = 'conv-detail inline-detail';
          tr.innerHTML = `<td colspan="3"><div class="transcript-box">Loading...</div></td>`;
          row.parentNode.insertBefore(tr, row.nextSibling);
          tr.style.display = 'table-row';
          const tbox = tr.querySelector('.transcript-box');
          try {
            const msgs = await api('/api/admin/conversations/' + viewBtn.dataset.sid + '/messages');
            if (!msgs || msgs.length === 0) { tbox.innerHTML = 'No messages'; return; }
            let mhtml = '';
            msgs.forEach(m => {
              mhtml += `<div class="t-msg"><div class="t-role">${esc(m.role)}</div><div class="t-content">${esc(m.content)}</div></div>`;
            });
            tbox.innerHTML = mhtml;
          } catch(err) { tbox.innerHTML = 'Error: ' + esc(err.message); }
        }
      });
    } catch(e) { errBox('conversations', e.message); }
  }

  async function loadHQ() {
    loading('handoff-queue');
    try {
      const data = await api('/api/admin/handoffs');
      if (!data) return;
      S.allHandoffs = data;
      let html = `
        <div class="filter-bar">
          <button class="filter-btn active" data-filter="all">ALL</button>
          <button class="filter-btn" data-filter="pending">PENDING</button>
          <button class="filter-btn" data-filter="resolved">RESOLVED</button>
        </div>
        <div class="tbl-wrap">
          <table>
            <thead><tr><th>ID</th><th>Session ID</th><th>Status</th><th>Time</th><th>Actions</th></tr></thead>
            <tbody id="hq-tbody"></tbody>
          </table>
        </div>
      `;
      setHTML('handoff-queue', html);

      const renderHQ = (items) => {
        const tb = document.getElementById('hq-tbody');
        if (!tb) return;
        tb.innerHTML = items.map(h => `
          <tr>
            <td>${esc(h.id)}</td>
            <td>${esc(h.session_id)}</td>
            <td><span class="badge ${h.status==='resolved'?'badge-resolved':'badge-pending'}">${h.status==='resolved'?'Resolved':'Pending'}</span></td>
            <td>${fmtDate(h.triggered_at)}</td>
            <td>
              ${h.status==='pending' ? `<button class="btn btn-sm btn-primary btn-res-hq" data-id="${esc(h.id)}">RESOLVE</button>` : ''}
              <button class="btn btn-sm btn-warning btn-view-hq" data-sid="${esc(h.session_id)}">VIEW CHAT</button>
            </td>
          </tr>
        `).join('');
      };
      renderHQ(S.allHandoffs);

      const b = body('handoff-queue');
      b.addEventListener('click', async e => {
        const filterBtn = e.target.closest('.filter-btn');
        if (filterBtn) {
          b.querySelectorAll('.filter-btn').forEach(bb => bb.classList.remove('active'));
          filterBtn.classList.add('active');
          const f = filterBtn.dataset.filter;
          if (f === 'all') renderHQ(S.allHandoffs);
          else renderHQ(S.allHandoffs.filter(h => h.status === f));
        }
        const resBtn = e.target.closest('.btn-res-hq');
        if (resBtn) {
          try {
            await api('/api/admin/handoff/' + resBtn.dataset.id, { method: 'PATCH', body: JSON.stringify({status: 'resolved'}) });
            loadHQ();
          } catch(err) { alert(err.message); }
        }
        const viewBtn = e.target.closest('.btn-view-hq');
        if (viewBtn) {
          const row = viewBtn.closest('tr');
          let next = row.nextElementSibling;
          if (next && next.classList.contains('conv-detail')) {
            next.style.display = next.style.display === 'none' ? 'table-row' : 'none';
            return;
          }
          const tr = document.createElement('tr');
          tr.className = 'conv-detail inline-detail';
          tr.innerHTML = `<td colspan="5"><div class="transcript-box">Loading...</div></td>`;
          row.parentNode.insertBefore(tr, row.nextSibling);
          tr.style.display = 'table-row';
          const tbox = tr.querySelector('.transcript-box');
          try {
            const msgs = await api('/api/admin/conversations/' + viewBtn.dataset.sid + '/messages');
            if (!msgs || msgs.length === 0) { tbox.innerHTML = 'No messages'; return; }
            tbox.innerHTML = msgs.map(m => `<div class="t-msg"><div class="t-role">${esc(m.role)}</div><div class="t-content">${esc(m.content)}</div></div>`).join('');
          } catch(err) { tbox.innerHTML = 'Error: ' + esc(err.message); }
        }
      });

      if (!S.handoffTimer) S.handoffTimer = setInterval(() => { if (S.section === 'handoff-queue') loadHQ(); }, 30000);
    } catch(e) { errBox('handoff-queue', e.message); }
  }

  async function loadFB() {
    loading('feedback');
    try {
      const data = await api('/api/admin/feedback');
      if (!data) return;
      S.allFeedback = data;
      let html = `
        <div class="filter-bar">
          <button class="filter-btn active" data-filter="all">ALL</button>
          <button class="filter-btn" data-filter="up">POSITIVE</button>
          <button class="filter-btn" data-filter="down">NEGATIVE</button>
        </div>
        <div class="tbl-wrap">
          <table>
            <thead><tr><th>Session</th><th>Rating</th><th>Message</th><th>Time</th></tr></thead>
            <tbody id="fb-tbody"></tbody>
          </table>
        </div>
      `;
      setHTML('feedback', html);

      const renderFB = (items) => {
        const tb = document.getElementById('fb-tbody');
        if (!tb) return;
        tb.innerHTML = items.map(i => `
          <tr>
            <td>${esc(i.session_id)}</td>
            <td>${i.rating === 1 ? '👍' : '👎'}</td>
            <td>${esc(trunc(i.message_content || i.message || '--', 80))}</td>
            <td>${fmtDate(i.created_at)}</td>
          </tr>
        `).join('');
      };
      renderFB(S.allFeedback);

      const b = body('feedback');
      b.addEventListener('click', e => {
        const filterBtn = e.target.closest('.filter-btn');
        if (filterBtn) {
          b.querySelectorAll('.filter-btn').forEach(bb => bb.classList.remove('active'));
          filterBtn.classList.add('active');
          const f = filterBtn.dataset.filter;
          if (f === 'all') renderFB(S.allFeedback);
          else if (f === 'up') renderFB(S.allFeedback.filter(x => x.rating === 1));
          else if (f === 'down') renderFB(S.allFeedback.filter(x => x.rating === -1));
        }
      });
    } catch(e) { errBox('feedback', e.message); }
  }

  async function loadSettings() {
    loading('settings');
    try {
      const s = await api('/api/admin/settings');
      if (!s) return;
      setHTML('settings', `
        <div class="card" style="max-width:500px;">
          <h3 class="card-title">System Configuration</h3>
          <div class="status-row"><span class="status-lbl">Base URL</span><span class="status-val">${esc(s.base_url || s.url)}</span></div>
          <div class="status-row"><span class="status-lbl">Access Code</span><span class="status-val">${esc(s.adminAccessCode || s.masked_access_code)}</span></div>
        </div>
      `);
    } catch(e) { errBox('settings', e.message); }
  }

  console.log('DOLPHI ADMIN: Ready, loading dashboard');
  go('dashboard');
});
</script>
