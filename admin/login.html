<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOLPHI Admin Login</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #F8FAFC; display: flex; justify-content: center; alignItems: center; height: 100vh; margin: 0; }
        .login-container { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); width: 100%; max-width: 320px; text-align: center; }
        .logo-container { margin-bottom: 24px; }
        .logo-text { font-size: 24px; font-weight: 800; color: #1A3A5C; letter-spacing: 0.1em; margin-bottom: 4px; }
        .logo-sub { font-size: 11px; color: #F5C518; letter-spacing: 0.15em; font-weight: bold; }
        input { width: 100%; padding: 12px; margin-bottom: 16px; border: 1px solid #E2E8F0; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 12px; background-color: #1A3A5C; color: white; border: none; border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer; transition: background-color 0.2s; }
        button:hover { background-color: #F5C518; color: #1A3A5C; }
        #error-msg { color: #DC2626; font-size: 12px; margin-top: 12px; display: none; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-container">
            <div class="logo-text">DOLPHI</div>
            <div class="logo-sub">ADMINISTRATION</div>
        </div>
        <form id="login-form">
            <input type="text" id="username" placeholder="Username" required />
            <input type="password" id="password" placeholder="Password" required />
            <button type="submit">LOGIN</button>
            <div id="error-msg">Invalid credentials. Please try again.</div>
        </form>
    </div>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                if (res.ok) {
                    window.location.href = '/admin';
                } else {
                    document.getElementById('error-msg').style.display = 'block';
                }
            } catch (err) {
                document.getElementById('error-msg').style.display = 'block';
            }
        });
    </script>
</body>
</html>
